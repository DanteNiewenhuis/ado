#
# Example execution context for an ado cluster whose dashboard is directly reachable
#
# Usage:
#   ado --remote execution_context_direct.yaml \
#       create operation -f operation.yaml
#
executionType:
  type: cluster
  # URL of the Ray cluster dashboard — must be reachable from your local machine.
  clusterUrl: "http://ray-cluster.my-namespace.svc.cluster.local:8265"
packages:
  # PyPI packages installed into the Ray job's virtual environment at submit time.
  fromPyPI:
    - ado-core
    - ado-ray-tune # include if the operation uses the ray_tune operator
  # Python packages  to build as wheels and ship with the job.
  # Relative paths are relative to where the ado --remote command is run
  # Leave this empty (or omit the key) if you are not using local plugins.
  fromSource: []
# Set to false to submit the job without waiting for it to complete.
# Useful for long-running operations where you do not need live log output.
wait: true
# Environment variables injected into the Ray job runtime.
envVars:
  PYTHONUNBUFFERED: "x" # Disable Python output buffering (recommended)
  OMP_NUM_THREADS: "1" # Limit threads to avoid exceeding node limits
  OPENBLAS_NUM_THREADS: "1"
  # RAY_AIR_NEW_PERSISTENCE_MODE: "0"  # Required for the ray_tune operator
  # LOGLEVEL: "INFO"                   # Optional: increase ado log verbosity

# Additional files or directories to send with the Ray job.
# Useful when an actuator configuration references local file paths
# additionalFiles:
#   - /absolute/path/to/data_file.csv
#   - path/to/my_data_dir/              # directories are also supported
